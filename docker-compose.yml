version: '3.8'

services:
  # 主应用服务（单容器：包含前端、后端、Nginx）
  meow-accounting:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        BACKEND_URL: ${BACKEND_URL:-http://localhost:3001}
    container_name: meow-accounting
    ports:
      - "80:80"        # HTTP 端口（单端口访问）
      - "443:443"      # HTTPS 端口（预留）
    volumes:
      - ./data:/app/data          # 数据持久化
      - ./logs:/app/logs          # 应用日志
      - ./logs/nginx:/var/log/nginx  # Nginx日志
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-your_strong_jwt_secret_change_this}
      - DB_PATH=/app/data/sqlite.db
      - DATABASE_URL=file:/app/data/sqlite.db
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:3001}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - REDIS_HOST=${REDIS_HOST:-192.168.123.5}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-bdtdhc6DizYQYbEZ}
      - REDIS_URL=${REDIS_URL:-redis://:bdtdhc6DizYQYbEZ@192.168.123.5:6379}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis缓存服务（可选）
  redis:
    image: redis:7-alpine
    container_name: meow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-defaultpassword}
    restart: unless-stopped
    profiles:
      - with-redis

  # PostgreSQL数据库（可选，替代SQLite）
  postgres:
    image: postgres:15-alpine
    container_name: meow-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-meow_accounting}
      - POSTGRES_USER=${POSTGRES_USER:-meow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-meow_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    profiles:
      - with-postgres

  # 监控服务 - Prometheus（可选）
  prometheus:
    image: prom/prometheus
    container_name: meow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    profiles:
      - monitoring

  # 监控服务 - Grafana（可选）
  grafana:
    image: grafana/grafana
    container_name: meow-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local